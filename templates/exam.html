<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taking Exam</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <div class="exam-card">
            <div class="exam-header">
                <h2>Certification Exam</h2>
                <div class="timer-display" id="timer">00:00</div>
            </div>
            <p class="progress">Answer all questions below</p>

            <form method="POST" action="{{ url_for('submit_exam') }}" id="examForm">
                {% for question in questions %}
                <div class="question-block">
                    <h3 class="question-number">Question {{ loop.index }} / {{ questions|length }}</h3>
                    <p class="question-text">{{ question.question }}</p>
                    <div class="options">
                        {% for option in question.options %}
                        <label class="option-label">
                            <input type="radio" name="{{ question.id }}" value="{{ loop.index0 }}" required>
                            <span class="option-text">{{ option }}</span>
                        </label>
                        {% endfor %}
                    </div>
                </div>
                {% endfor %}

                <div class="submit-section">
                    <button type="submit" class="submit-btn" id="submitBtn">
                        Submit Exam
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // Live count-up timer
        let seconds = 0;
        const timerEl = document.getElementById('timer');

        function pad(n) { return String(n).padStart(2, '0'); }

        function tick() {
            seconds++;
            timerEl.textContent = pad(Math.floor(seconds / 60)) + ':' + pad(seconds % 60);
        }

        const interval = setInterval(tick, 1000);

        // Confirm before submit
        document.getElementById('examForm').addEventListener('submit', function(e) {
            clearInterval(interval);
            if (!confirm('Submit exam? You cannot change your answers after submission.')) {
                e.preventDefault();
                setInterval(tick, 1000); // resume if cancelled
            }
        });
    </script>
</body>
</html>
